##
## IP Camera System — Nginx configuration
##
## Serves:
##   /frigate/          — proxied to Frigate NVR UI/API (port 5000 on host)
##   /go2rtc/           — proxied to go2rtc live stream API (port 1984 on host)
##   /recordings/<cam>/ — recorded MP4 files for seek-friendly playback
##   /                  — proxied to the Flask dashboard on port 8080
##

# ── HTTP server — main dashboard (port 80) ────────────────────────────────────
server {
    listen 80;
    server_name _;

    # ── Frigate NVR UI + API ──────────────────────────────────────────────────
    # Frigate runs on the host with network_mode:host (port 5000)
    location /frigate/ {
        proxy_pass         http://host.docker.internal:5000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $http_upgrade;
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }

    # ── go2rtc live stream API (HLS/WebRTC) ───────────────────────────────────
    # go2rtc runs inside Frigate on port 1984
    location /go2rtc/ {
        proxy_pass         http://host.docker.internal:1984/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering    off;

        # HLS/TS MIME types
        types {
            application/vnd.apple.mpegurl  m3u8;
            video/mp2t                      ts;
        }

        add_header  Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header  Access-Control-Allow-Origin  * always;
    }

    # ── Recorded MP4 files ────────────────────────────────────────────────────
    location /recordings/ {
        alias /recordings/;
        mp4;                         # nginx mp4 module — enables time-range seeks
        mp4_max_buffer_size  10m;

        add_header  Cache-Control  "no-store";
        add_header  Access-Control-Allow-Origin  *;
    }

    # ── Permanent excerpts ────────────────────────────────────────────────────
    location /excerpts/ {
        alias /excerpts/;
        mp4;
        mp4_max_buffer_size  10m;

        add_header  Cache-Control  "no-store";
        add_header  Access-Control-Allow-Origin  *;
    }

    # ── VOD playback files ─────────────────────────────────────────────────────
    # Try serving from disk first (cached .ts, .mp4, .m3u8), fall back to
    # Flask for on-demand segment conversion.
    location /vod/ {
        alias /vod/;
        mp4;
        mp4_max_buffer_size  30m;

        types {
            application/vnd.apple.mpegurl  m3u8;
            video/mp4                       mp4;
            video/mp2t                      ts;
        }

        add_header  Cache-Control  "no-store";
        add_header  Access-Control-Allow-Origin  * always;

        try_files $uri @vod_flask;
    }

    location @vod_flask {
        proxy_pass         http://dashboard:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 60s;
    }

    # ── Dashboard (Flask) ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://dashboard:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }
}
