##
## IP Camera System — Nginx configuration
##
## Serves:
##   /hls/<camera>/         — live HLS stream segments (from shared volume)
##   /recordings/<camera>/  — recorded MP4 files for seek-friendly playback
##   /                      — proxied to the Flask dashboard on port 8080
##

# ── HTTPS server — DVR proxy only (port 443) ─────────────────────────────────
# Required for SharedArrayBuffer (WASM streaming) which needs a secure context.
# Self-signed cert: browser will warn once; click "Advanced → Proceed" to accept.
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── TigerSecu DVR WebSocket proxies ──────────────────────────────────────
    location /dvr-ws/1/streaming {
        proxy_pass            https://192.168.1.251/streaming;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade    $http_upgrade;
        proxy_set_header      Connection "upgrade";
        proxy_set_header      Host       192.168.1.251;
        proxy_set_header      Origin     "https://192.168.1.251";
        proxy_ssl_verify      off;
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
    }

    location /dvr-ws/2/streaming {
        proxy_pass            https://192.168.1.252/streaming;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade    $http_upgrade;
        proxy_set_header      Connection "upgrade";
        proxy_set_header      Host       192.168.1.252;
        proxy_set_header      Origin     "https://192.168.1.252";
        proxy_ssl_verify      off;
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
    }

    # ── DVR proxy (Flask) ─────────────────────────────────────────────────────
    location /dvr-proxy/ {
        proxy_pass         http://dashboard:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }
}

# ── HTTP server — main dashboard (port 80) ────────────────────────────────────
server {
    listen 80;
    server_name _;

    # ── HLS live stream segments ──────────────────────────────────────────────
    location /hls/ {
        alias /hls/;

        # Serve .m3u8 and .ts with correct MIME types
        types {
            application/vnd.apple.mpegurl  m3u8;
            video/mp2t                      ts;
        }
        default_type  application/octet-stream;

        # Never cache playlist files; short-cache for segments
        add_header  Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header  Access-Control-Allow-Origin  * always;

        # Enable CORS pre-flight
        if ($request_method = 'OPTIONS') {
            add_header  Access-Control-Allow-Origin  *;
            add_header  Access-Control-Allow-Methods "GET, OPTIONS";
            add_header  Access-Control-Max-Age  1728000;
            return 204;
        }
    }

    # ── Recorded MP4 files ────────────────────────────────────────────────────
    location /recordings/ {
        alias /recordings/;
        mp4;                         # nginx mp4 module — enables time-range seeks
        mp4_max_buffer_size  10m;

        add_header  Cache-Control  "no-store";
        add_header  Access-Control-Allow-Origin  *;
    }

    # ── Permanent excerpts ────────────────────────────────────────────────────
    location /excerpts/ {
        alias /excerpts/;
        mp4;
        mp4_max_buffer_size  10m;

        add_header  Cache-Control  "no-store";
        add_header  Access-Control-Allow-Origin  *;
    }

    # ── Dashboard (Flask) ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://dashboard:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }
}
