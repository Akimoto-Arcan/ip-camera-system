version: "3.9"

# ──────────────────────────────────────────────
#  IP Camera System
#  Relocate by copying this entire directory
#  (and optionally the recordings directory).
# ──────────────────────────────────────────────

services:

  # ── Frigate NVR (recording + live streaming) ─────────────────────────────
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: ipcam-frigate
    restart: unless-stopped
    network_mode: host          # must reach cameras on 192.168.100.0/24
    privileged: true
    shm_size: "256mb"
    volumes:
      - ./frigate:/config
      - ${FRIGATE_MEDIA_DIR:-/mnt/ipcam-storage}:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TIMEZONE:-UTC}
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ── ONVIF WS-Discovery scanner ────────────────────────────────────────────
  scanner:
    build:
      context: ./scanner
    container_name: ipcam-scanner
    restart: unless-stopped
    network_mode: host          # needs multicast access for WS-Discovery
    volumes:
      - ./config:/config
    environment:
      - CONFIG_PATH=/config/cameras.yml
      - ONVIF_USERNAME=${ONVIF_USERNAME:-admin}
      - ONVIF_PASSWORD=${ONVIF_PASSWORD:-}
      - CAMERA_SUBNET=${CAMERA_SUBNET:-192.168.100.0/24,192.168.1.0/24}
      - TZ=${TIMEZONE:-UTC}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Web dashboard (Flask API) ─────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
    container_name: ipcam-dashboard
    restart: unless-stopped
    expose:
      - "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config:/config
      - ./frigate:/frigate-config
      - ./frigate/frigate.db:/config/frigate.db:ro
      - ${FRIGATE_MEDIA_DIR:-/mnt/ipcam-storage}/recordings:/recordings:ro
      - ${EXCERPTS_DIR:-./excerpts}:/excerpts
      - ${VOD_DIR:-/mnt/ipcam-storage/vod}:/vod
      - ${CHUNKS_DIR:-/mnt/ipcam-storage/chunks}:/chunks
      - ./docs:/docs:ro
    environment:
      - RECORDINGS_PATH=/recordings
      - EXCERPTS_PATH=/excerpts
      - VOD_PATH=/vod
      - CHUNKS_PATH=/chunks
      - CONFIG_PATH=/config/cameras.yml
      - FRIGATE_URL=http://host.docker.internal:5000
      - FRIGATE_CONFIG_PATH=/frigate-config/config.yml
      - DOCS_PATH=/docs
      - TZ=${TIMEZONE:-UTC}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx reverse proxy + static file server ──────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ipcam-nginx
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${RECORDINGS_DIR:-./recordings}:/recordings:ro
      - ${EXCERPTS_DIR:-./excerpts}:/excerpts:ro
      - ${VOD_DIR:-/mnt/ipcam-storage/vod}:/vod:ro
    depends_on:
      - dashboard
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
