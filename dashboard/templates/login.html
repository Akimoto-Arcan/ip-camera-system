<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FMS Camera System</title>
  <style>
    :root {
      --bg0: #07090d; --bg2: #111820; --bg3: #16202d;
      --border: #1e2d3d; --text1: #e2e8f0; --text2: #8fa3b1;
      --text3: #4a6070; --blue: #3b82f6; --red: #ef4444;
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg0);
      color: var(--text1);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      width: 340px;
    }
    h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
    .sub { color: var(--text3); font-size: .8rem; margin-bottom: 28px; }
    label { display: block; color: var(--text2); font-size: .8rem; margin-bottom: 5px; }
    input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text1);
      padding: 9px 12px;
      font-size: .9rem;
      outline: none;
      margin-bottom: 16px;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--blue); }
    .error {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 6px;
      color: var(--red);
      font-size: .82rem;
      padding: 9px 12px;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      background: var(--blue);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: .9rem;
      font-weight: 600;
      padding: 10px;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:hover { opacity: .85; }
    .help-link {
      display: block; text-align: center; margin-top: 14px;
      color: var(--text3); font-size: .78rem; text-decoration: none;
    }
    .help-link:hover { color: var(--text2); }
  </style>
</head>
<body>
<div class="card">
  <h1>FMS Camera System</h1>
  <div class="sub">Sign in to continue</div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="post">
    <label>Username</label>
    <input type="text" name="username" autocomplete="username" autofocus>
    <label>Password</label>
    <input type="password" name="password" autocomplete="current-password">
    <button type="submit">Sign in</button>
  </form>
  <a href="/guide" target="_blank" class="help-link">? User Guide — http://192.168.1.61/guide</a>
</div>
</body>
</html>
