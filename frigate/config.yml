# ─────────────────────────────────────────────────────────────────────────────
#  Frigate NVR — configuration
#
#  Only RTSP cameras (enabled: true) are managed here.
#  DVR cameras (TigerSecu) are handled separately by the DVR proxy.
#
#  Add new cameras by appending entries under go2rtc.streams and cameras.
#  Camera names must match cameras.yml exactly (Frigate only allows [a-z0-9_]).
# ─────────────────────────────────────────────────────────────────────────────

mqtt:
  enabled: false          # set to true and add broker config if using Home Assistant

database:
  path: /config/frigate.db

# ── Global recording defaults ─────────────────────────────────────────────────
record:
  enabled: true
  alerts:
    retain:
      days: 60
  detections:
    retain:
      days: 60

# ── Snapshots ─────────────────────────────────────────────────────────────────
  continuous:
    days: 30
  motion:
    days: 30
snapshots:
  enabled: true
  retain:
    default: 30

# ── Detection — disabled globally (no Coral TPU). Enable per-camera if added ──
detectors:
  cpu1:
    type: cpu
    num_threads: 2

# ── go2rtc — live stream sources ──────────────────────────────────────────────
# Each key must match the camera name in the cameras section below.
# go2rtc exposes HLS at /api/stream.m3u8?src=<name> on port 1984.
go2rtc:
  streams:
    Maintenance_Shop:
      - "ffmpeg:rtsp://admin:123456@192.168.100.45:554/stream0#video=h264#audio=copy"
    DBP2_Winders:
      - "ffmpeg:rtsp://admin:123456@192.168.100.10:554/stream0#video=h264#audio=copy"

# ── Cameras ───────────────────────────────────────────────────────────────────
cameras:
  Maintenance_Shop:
    ffmpeg:
      inputs:
        - path: rtsp://admin:123456@192.168.100.45:554/stream0
          roles:
            - record
    record:
      enabled: true
    detect:
      enabled: false
      width: 1920
      height: 1080
    snapshots:
      enabled: true

  DBP2_Winders:
    ffmpeg:
      inputs:
        - path: rtsp://admin:123456@192.168.100.10:554/stream0
          roles:
            - record
    record:
      enabled: true
    detect:
      enabled: false
      width: 1920
      height: 1080
    snapshots:
      enabled: true
version: 0.17-0
